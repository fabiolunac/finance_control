<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Gastos</title>
  <meta name="description" content="Tabela de gastos tratada, sincronizada entre dispositivos.">

  <!-- PWA: manifesto e cor do tema (barra do navegador/celular) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#101418">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">
    <div class="topo-inner">
      <span class="marca-ponto" aria-hidden="true"></span>
      <h1>Controle de Gastos</h1>
      <span id="status-rede" class="badge badge-online">online</span>
    </div>
  </header>

  <main class="conteudo">

    <div class="abas">
      <button id="aba-tabela" class="aba aba-ativa" type="button">Tabela</button>
    </div>

    <p id="erro" class="erro" hidden></p>

    <div class="filtros">
      <select id="filtro-mes" aria-label="Filtrar por mês de pagamento"></select>
      <select id="filtro-categoria" aria-label="Filtrar por categoria"></select>
      <select id="filtro-categoria-geral" aria-label="Filtrar por categoria geral"></select>
      <select id="filtro-local" aria-label="Filtrar por local"></select>
    </div>

    <div class="tabela-wrap">
      <table class="tabela">
        <thead>
          <tr>
            <th>Data</th>
            <th>Local</th>
            <th>Categoria</th>
            <th>Categoria Geral</th>
            <th>Banco</th>
            <th>Tipo</th>
            <th class="col-valor">Valor</th>
            <th class="col-valor">Saldo</th>
            <th>Mês Pagamento</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela" aria-live="polite"></tbody>
      </table>
    </div>

    <p id="vazio" class="vazio" hidden>Nenhum gasto registrado.</p>

  </main>

  <script src="script.js"></script>

  <!-- Registro do Service Worker: é isso que torna o site um PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker registrado ✔'))
        .catch((erro) => console.error('Falha no Service Worker:', erro));
    }
  </script>
</body>
</html>
