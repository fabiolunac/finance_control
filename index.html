<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Gastos</title>
  <meta name="description" content="Controle de gastos pessoal, sincronizado entre dispositivos, instalável como aplicativo.">

  <!-- PWA: manifesto e cor do tema (barra do navegador/celular) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#101418">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">
    <div class="topo-inner">
      <span class="marca-ponto" aria-hidden="true"></span>
      <h1>Controle de Gastos</h1>
      <span id="status-rede" class="badge badge-online">online</span>
    </div>
  </header>

  <main class="conteudo">

    <div class="abas">
      <button id="aba-mes" class="aba aba-ativa" type="button">Por mês</button>
      <button id="aba-tudo" class="aba" type="button">Tudo</button>
    </div>

    <div id="barra-mes" class="barra-mes">
      <button id="mes-anterior" class="botao-mes" aria-label="Mês anterior">‹</button>
      <input id="campo-mes" type="month" aria-label="Selecionar mês">
      <button id="mes-seguinte" class="botao-mes" aria-label="Próximo mês">›</button>
    </div>

    <div class="total-mes">
      <span id="rotulo-total">Total do mês:</span> <strong id="valor-total">R$ 0,00</strong>
    </div>

    <form id="form-gasto" class="novo-gasto">
      <input id="campo-data" type="date" required>
      <input id="campo-local" type="text" placeholder="Onde foi o gasto?" autocomplete="off" maxlength="120" required>
      <input id="campo-valor" type="number" step="0.01" min="0" placeholder="Valor" required>
      <button id="botao-adicionar" type="submit" title="Adicionar gasto">Adicionar</button>
    </form>

    <p id="erro" class="erro" hidden></p>

    <ul id="lista" class="lista" aria-live="polite"></ul>

    <p id="vazio" class="vazio">
      Nenhum gasto neste mês ainda. Adicione o primeiro acima.
    </p>

  </main>

  <!-- Botão de instalar: só aparece quando o navegador permite -->
  <button id="botao-instalar" class="instalar" hidden>
    ⬇ Instalar como aplicativo
  </button>

  <footer class="rodape">
    Feito com HTML, CSS e JS · hospedado no GitHub Pages · dados sincronizados via API
  </footer>

  <script src="script.js"></script>

  <!-- Registro do Service Worker: é isso que torna o site um PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker registrado ✔'))
        .catch((erro) => console.error('Falha no Service Worker:', erro));
    }
  </script>
</body>
</html>
