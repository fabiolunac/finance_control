<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Gastos</title>
  <meta name="description" content="Tabela de gastos tratada, sincronizada entre dispositivos.">

  <!-- PWA: manifesto e cor do tema (barra do navegador/celular) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0B0D10">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topo">
    <div class="topo-inner">
      <span class="marca-ponto" aria-hidden="true"></span>
      <h1>Controle de Gastos</h1>
      <span id="status-rede" class="badge badge-online">online</span>
    </div>
  </header>

  <main class="conteudo">

    <div class="abas">
      <button id="aba-tabela" class="aba aba-ativa" type="button">Tabela</button>
      <button id="aba-adicionar" class="aba" type="button">Adicionar</button>
      <button id="aba-graficos" class="aba" type="button">Gráficos</button>
    </div>

    <p id="erro" class="erro" hidden></p>

    <section id="secao-tabela">

      <div class="filtros">
        <div id="filtro-mes" aria-label="Filtrar por mês de pagamento"></div>
        <div id="filtro-categoria" aria-label="Filtrar por categoria"></div>
        <div id="filtro-categoria-geral" aria-label="Filtrar por categoria geral"></div>
        <div id="filtro-local" aria-label="Filtrar por local"></div>
      </div>

      <div class="tabela-wrap">
        <table class="tabela">
          <thead>
            <tr>
              <th>Data</th>
              <th>Local</th>
              <th>Categoria</th>
              <th>Categoria Geral</th>
              <!-- <th>Banco</th> -->
              <!-- <th>Tipo</th> -->
              <th class="col-valor">Valor</th>
              <!-- <th class="col-valor">Saldo</th> -->
              <th>Mês Pagamento</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela" aria-live="polite"></tbody>
        </table>
      </div>

      <p id="vazio" class="vazio" hidden>Nenhum gasto registrado.</p>

    </section>

    <section id="secao-adicionar" hidden>

      <form id="form-gasto" class="novo-gasto">
        <input id="campo-data" type="date" required>
        <input id="campo-local" type="text" placeholder="Local" autocomplete="off" maxlength="120" required>
        <input id="campo-valor" type="number" step="0.01" min="0" placeholder="Valor" required>
        <input id="campo-tipo" list="opcoes-tipo" value="Gasto" placeholder="Tipo" required>
        <datalist id="opcoes-tipo"></datalist>
        <input id="campo-banco" list="opcoes-banco" value="yuh" placeholder="Banco" required>
        <datalist id="opcoes-banco"></datalist>
        <button type="submit">Adicionar</button>
      </form>

      <p id="sucesso" class="sucesso" hidden></p>

    </section>

    <section id="secao-graficos" hidden>

      <div class="filtros">
        <div id="grafico-categoria" aria-label="Filtrar gráfico por categoria"></div>
        <div id="grafico-categoria-geral" aria-label="Filtrar gráfico por categoria geral"></div>
        <div id="grafico-local" aria-label="Filtrar gráfico por local"></div>
      </div>

      <div class="cartao-grafico">
        <h2 class="titulo-grafico">Total de gastos por mês</h2>
        <div id="grafico-mensal" class="grafico"></div>
        <p id="grafico-vazio" class="vazio" hidden>Nenhum gasto para esses filtros.</p>
      </div>

    </section>

  </main>

  <script src="script.js"></script>

  <!-- Registro do Service Worker: é isso que torna o site um PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker registrado ✔'))
        .catch((erro) => console.error('Falha no Service Worker:', erro));
    }
  </script>
</body>
</html>
